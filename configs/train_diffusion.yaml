data:
  path: data/image.hdf5
  schema: robomimic_image
  camera: agentview_image
  train_split: 0.9
  image_size: 84
  state_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
    - object

model:
  action_dim: 7
  hidden_dim: 256
  cond_dim: 256
  n_blocks: 4
  T: 100
  ddim_steps: 10
  freeze_encoder: false
  state_dim: 19  # robot0_eef_pos(3) + robot0_eef_quat(4) + robot0_gripper_qpos(2) + object(10)

training:
  seed: 42
  epochs: 200
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.00001
  grad_clip: 1.0
  save_every: 20
  log_dir: runs_diffusion/
  checkpoint_dir: models_diffusion/

evaluation:
  seed: 42
  partial_lift_threshold: 0.03
