data:
  path: data/scripted_expert.hdf5
  schema: robomimic_image
  camera: agentview_image
  train_split: 0.9
  image_size: 84
  frame_stack: 1
  state_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
    - object

model:
  action_dim: 7
  hidden_dim: 256
  cond_dim: 256
  n_blocks: 4
  T: 100
  ddim_steps: 10        # training DDIM steps (eval uses --eta and more steps)
  freeze_encoder: false
  state_dim: 19         # robot0_eef_pos(3) + robot0_eef_quat(4) + robot0_gripper_qpos(2) + object(10)
  pred_horizon: 8
  exec_horizon: 8       # full chunk commitment — best setting from ablation
  dropout: 0.1

training:
  seed: 42
  epochs: 200           # 1000 demos × ~50 steps × 0.9 = ~45k train steps; more epochs for convergence
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  save_every: 20
  log_dir: runs_diffusion_scripted/
  checkpoint_dir: models_diffusion_scripted/

evaluation:
  seed: 42
  partial_lift_threshold: 0.03
