data:
  path: data/image.hdf5
  camera: agentview_image
  train_split: 0.9
  image_size: 84

model:
  encoder: resnet18
  freeze_encoder: false
  action_dim: 7
  hidden_dim: 256

training:
  epochs: 100
  batch_size: 64
  lr: 1e-4
  weight_decay: 1e-5
  grad_clip: 1.0
  save_every: 10
  log_dir: runs/
  checkpoint_dir: models/
