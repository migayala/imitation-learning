data:
  path: data/image.hdf5
  schema: robomimic_image
  camera: agentview_image
  train_split: 0.9
  image_size: 84

model:
  encoder: resnet18
  freeze_encoder: false
  action_dim: 7
  hidden_dim: 256

training:
  seed: 42
  epochs: 100
  batch_size: 64
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.00001
  action_loss_weights: [1, 1, 1, 1, 1, 1, 3]
  grad_clip: 1.0
  save_every: 10
  log_dir: runs_dim6_weighted/
  checkpoint_dir: models_dim6_weighted/

evaluation:
  seed: 42
